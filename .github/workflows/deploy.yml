name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - develop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5        

      - name: Setup Node.js
        uses: actions/setup-node@v5      
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5       
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

  deploy-production:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment (prod)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROD }}
      - name: Resumo do deploy com IA
        env:
          OPENAI_TOKEN: ${{ secrets.OPENAI_TOKEN }}
        run: |
          RESUMO=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o",
              "max_tokens": 200,
              "messages": [{
                "role": "user",
                "content": "Gere um resumo técnico curto (3 linhas) de um deploy feito no branch ${{ github.ref_name }}, commit ${{ github.sha }}, por ${{ github.actor }}. Seja direto e objetivo."
              }]
            }') 

          echo "$RESUMO" | jq -r '.choices[0].message.content'

  deploy-staging:
    needs: test
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment (dev)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      - name: Deploy to staging
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      - name: Resumo do deploy com IA
        env:
          OPENAI_TOKEN: ${{ secrets.OPENAI_TOKEN }}
        run: |
          RESUMO=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o",
              "max_tokens": 200,
              "messages": [{
                "role": "user",
                "content": "Gere um resumo técnico curto (3 linhas) de um deploy feito no branch ${{ github.ref_name }}, commit ${{ github.sha }}, por ${{ github.actor }}. Seja direto e objetivo."
              }]
            }') 

          echo "$RESUMO" | jq -r '.choices[0].message.content'